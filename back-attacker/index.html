<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Back Attacker</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #05070d;
      color: #e8eefc;
      font-family: Arial, sans-serif;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }
    .wrap { width: min(92vw, 760px); }
    .hud {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-weight: 700;
      font-size: 14px;
    }
    canvas {
      width: 100%;
      height: auto;
      display: block;
      border: 1px solid #223250;
      border-radius: 10px;
      background: #0a1222;
      cursor: crosshair;
    }
    .hint {
      margin-top: 8px;
      font-size: 12px;
      color: #9fb2d7;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hud">
      <span id="score">Score: 0</span>
      <span id="lives">Lives: 3</span>
      <span id="state">Running</span>
    </div>
    <canvas id="game" width="760" height="460" tabindex="0"></canvas>
    <div class="hint">Move with A/D or Left/Right. Shoot with Space or click/tap.</div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const livesEl = document.getElementById("lives");
    const stateEl = document.getElementById("state");

    const state = {
      running: true,
      score: 0,
      lives: 3,
      playerX: canvas.width / 2,
      keys: {},
      bullets: [],
      enemies: [],
      lastEnemyAt: 0,
      lastShotAt: 0
    };

    function beep(freq, ms) {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return;
      if (!beep.ctx) beep.ctx = new Ctx();
      const ac = beep.ctx;
      if (ac.state === "suspended") ac.resume();
      const o = ac.createOscillator();
      const g = ac.createGain();
      o.type = "square";
      o.frequency.value = freq;
      g.gain.value = 0.04;
      o.connect(g);
      g.connect(ac.destination);
      o.start();
      o.stop(ac.currentTime + ms / 1000);
    }

    function spawnEnemy(now) {
      if (now - state.lastEnemyAt < 700) return;
      state.lastEnemyAt = now;
      const fromLeft = Math.random() < 0.5;
      state.enemies.push({
        x: fromLeft ? -25 : canvas.width + 25,
        y: 70 + Math.random() * 230,
        vx: fromLeft ? 1.9 + Math.random() * 1.3 : -(1.9 + Math.random() * 1.3),
        size: 18,
        passed: false
      });
    }

    function shoot(now) {
      if (!state.running) return;
      if (now - state.lastShotAt < 180) return;
      state.lastShotAt = now;
      state.bullets.push({ x: state.playerX, y: canvas.height - 58, vy: -7.8 });
      beep(500, 60);
    }

    function reset() {
      state.running = true;
      state.score = 0;
      state.lives = 3;
      state.playerX = canvas.width / 2;
      state.bullets = [];
      state.enemies = [];
      state.lastEnemyAt = 0;
      state.lastShotAt = 0;
      scoreEl.textContent = "Score: 0";
      livesEl.textContent = "Lives: 3";
      stateEl.textContent = "Running - A/D or Arrows, Space/Click to shoot";
    }

    function endGame() {
      state.running = false;
      stateEl.textContent = "Game Over - click to restart";
      beep(170, 180);
    }

    function update(now) {
      if (!state.running) return;

      if (state.keys["ArrowLeft"] || state.keys["a"] || state.keys["A"]) state.playerX -= 5.8;
      if (state.keys["ArrowRight"] || state.keys["d"] || state.keys["D"]) state.playerX += 5.8;
      state.playerX = Math.max(24, Math.min(canvas.width - 24, state.playerX));

      spawnEnemy(now);

      for (const b of state.bullets) b.y += b.vy;
      state.bullets = state.bullets.filter((b) => b.y > -20);

      for (const e of state.enemies) {
        e.x += e.vx;
        if (!e.passed && (e.x < -40 || e.x > canvas.width + 40)) {
          e.passed = true;
          state.lives -= 1;
          livesEl.textContent = `Lives: ${state.lives}`;
          beep(140, 120);
          if (state.lives <= 0) endGame();
        }
      }
      state.enemies = state.enemies.filter((e) => !e.passed);

      for (let i = state.enemies.length - 1; i >= 0; i--) {
        const e = state.enemies[i];
        for (let j = state.bullets.length - 1; j >= 0; j--) {
          const b = state.bullets[j];
          const dx = e.x - b.x;
          const dy = e.y - b.y;
          if (dx * dx + dy * dy < (e.size + 4) * (e.size + 4)) {
            state.enemies.splice(i, 1);
            state.bullets.splice(j, 1);
            state.score += 10;
            scoreEl.textContent = `Score: ${state.score}`;
            beep(780, 45);
            break;
          }
        }
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (let i = 0; i < 40; i++) {
        const x = (i * 137) % canvas.width;
        const y = (i * 89) % canvas.height;
        ctx.fillStyle = "#1a2847";
        ctx.fillRect(x, y, 2, 2);
      }

      ctx.fillStyle = "#7ad2ff";
      ctx.beginPath();
      ctx.moveTo(state.playerX, canvas.height - 66);
      ctx.lineTo(state.playerX - 18, canvas.height - 28);
      ctx.lineTo(state.playerX + 18, canvas.height - 28);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = "#ffd166";
      for (const b of state.bullets) ctx.fillRect(b.x - 2, b.y - 8, 4, 12);

      ctx.fillStyle = "#ff5d73";
      for (const e of state.enemies) {
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function frame(now) {
      update(now);
      draw();
      requestAnimationFrame(frame);
    }

    document.addEventListener("keydown", (e) => {
      state.keys[e.key] = true;
      if (!state.running) reset();
      if (e.key === " " || e.key === "Spacebar") {
        e.preventDefault();
        shoot(performance.now());
      }
    });
    document.addEventListener("keyup", (e) => {
      state.keys[e.key] = false;
    });
    canvas.addEventListener("mousedown", () => {
      canvas.focus();
      if (!state.running) reset();
      shoot(performance.now());
    });
    canvas.addEventListener("touchstart", (e) => {
      e.preventDefault();
      if (!state.running) reset();
      shoot(performance.now());
    }, { passive: false });

    reset();
    requestAnimationFrame(frame);
  </script>
</body>
</html>
